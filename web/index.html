<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Paragliding Thermal Heatmap — Arbas</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0f1a; color: #e0e8f0; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
    #canvas-container { width: 100vw; height: 100vh; position: relative; }
    canvas { display: block; }

    #ui-panel {
      position: absolute;
      top: 16px; right: 16px;
      width: 250px;
      background: rgba(10,15,30,0.85);
      border: 1px solid rgba(100,160,255,0.3);
      border-radius: 12px;
      padding: 16px;
      backdrop-filter: blur(8px);
    }
    #ui-panel h2 {
      font-size: 14px;
      color: #7eb8ff;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 12px;
    }
    .control-group { margin-bottom: 12px; }
    .control-group label {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: #99b8d0;
      margin-bottom: 4px;
    }
    .control-group label span { color: #7eb8ff; font-weight: bold; }
    input[type="range"] {
      width: 100%;
      appearance: none;
      -webkit-appearance: none;
      height: 4px;
      background: rgba(100,160,255,0.2);
      border-radius: 2px;
      outline: none;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px; height: 14px;
      border-radius: 50%;
      background: #7eb8ff;
      cursor: pointer;
    }
    .scenario-btn {
      display: inline-block;
      padding: 4px 10px;
      margin: 3px 2px;
      font-size: 11px;
      border: 1px solid rgba(100,160,255,0.4);
      border-radius: 20px;
      cursor: pointer;
      color: #99b8d0;
      background: transparent;
      transition: all 0.2s;
    }
    .scenario-btn.active { background: #7eb8ff; color: #0a0f1a; border-color: #7eb8ff; }
    #colorbars {
      position: absolute;
      bottom: 24px; left: 20px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: flex-end;
      justify-content: flex-end;
      max-width: 420px;
    }
    .mode-btn {
      display: inline-block;
      padding: 4px 9px;
      margin: 3px 2px;
      font-size: 11px;
      border: 1px solid rgba(255,200,80,0.4);
      border-radius: 20px;
      cursor: pointer;
      color: #d0b870;
      background: transparent;
      transition: all 0.2s;
    }
    .mode-btn.active { background: #c8a040; color: #0a0f1a; border-color: #c8a040; }
    .mode-btn.active.modified { background: rgba(140,110,30,0.35); color: #b89840; border-color: rgba(180,150,50,0.5); }
    .colorbar {
      background: rgba(10,15,30,0.82);
      border: 1px solid rgba(100,160,255,0.2);
      border-radius: 8px;
      padding: 10px 12px;
    }
    .colorbar-title {
      text-align: center;
      margin-bottom: 6px;
      font-weight: bold;
      color: #7eb8ff;
      font-size: 11px;
    }
    .colorbar-body {
      display: flex;
      gap: 6px;
      align-items: stretch;
    }
    .colorbar-canvas { border-radius: 3px; }
    .colorbar-labels {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      font-size: 10px;
      color: #99b8d0;
      line-height: 1;
    }
    #loading {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      color: #7eb8ff;
    }
    #loading .spinner {
      width: 40px; height: 40px;
      border: 3px solid rgba(126,184,255,0.2);
      border-top-color: #7eb8ff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #info-panel {
      position: absolute;
      top: 16px; left: 16px;
      width: 250px;
      background: rgba(10,15,30,0.85);
      border: 1px solid rgba(100,160,255,0.3);
      border-radius: 12px;
      padding: 16px;
      font-size: 12px;
      color: #c8d8e8;
      backdrop-filter: blur(8px);
      display: none;
    }
    #info-panel h2 {
      font-size: 14px;
      color: #7eb8ff;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 4px;
    }
    #info-panel .info-coords {
      font-size: 10px;

      margin-bottom: 10px;
    }
    #info-panel .info-row {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 5px;
      border-bottom: 1px solid rgba(100,160,255,0.08);
      padding-bottom: 5px;
    }
    #info-panel .info-row:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
    #info-panel .info-label { color: #6888a0; }
    #info-panel .info-val   { color: #e0f0ff; font-weight: bold; text-align: right; }
    #plume-section {
      margin-top: 12px;
      border-top: 1px solid rgba(100,160,255,0.15);
      padding-top: 10px;
    }
    #plume-section h3 {
      font-size: 11px;
      color: #6888a0;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin: 0 0 8px;
    }
    #plume-wrap {
      display: flex;
      gap: 6px;
      align-items: stretch;
    }
    #plume-alt-labels {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      font-size: 9px;
      color: #5577aa;
      text-align: right;
      min-width: 36px;
      padding-bottom: 18px; /* align with canvas bottom (room for x-label) */
    }
    #plume-canvas {
      flex: 1;
      height: 360px;
      border-radius: 4px;
    }
  </style>
</head>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.169.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.169.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ─── Scene setup ───────────────────────────────────────────────────────────
const container = document.getElementById('canvas-container');
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
container.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x040810);
scene.fog = new THREE.Fog(0x040810, 8000, 18000);

const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 10, 30000);
camera.position.set(0, -2500, 2500);
camera.up.set(0, 0, 1);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 0, 800);
controls.enableDamping = true;
controls.dampingFactor = 0.06;
controls.minDistance = 200;
controls.maxDistance = 12000;
controls.maxPolarAngle = Math.PI * 0.48;

// Lighting
const ambientLight = new THREE.AmbientLight(0x1a2a3a, 2);
scene.add(ambientLight);
const sun = new THREE.DirectionalLight(0xfff0dd, 3);
sun.position.set(1000, -500, 2000);
sun.castShadow = true;
// Shadow map — high resolution, frustum tightly fitted to terrain extent
sun.shadow.mapSize.width  = 4096;
sun.shadow.mapSize.height = 4096;
sun.shadow.camera.left   = -5500;
sun.shadow.camera.right  =  5500;
sun.shadow.camera.top    =  5500;
sun.shadow.camera.bottom = -5500;
sun.shadow.camera.near   = 100;
sun.shadow.camera.far    = 18000;
sun.shadow.bias          = -0.002;   // prevents shadow acne on large terrain
scene.add(sun);

// ─── Data ──────────────────────────────────────────────────────────────────
let simData = null;
let currentScenario = 0;
let terrainMesh = null;

// ─── Load simulation data ───────────────────────────────────────────────────
async function loadData() {
  try {
    const [simResp, modesResp, settingsResp, cmapsResp] = await Promise.all([
      fetch('../data/simulation.json'),
      fetch('modes.json'),
      fetch('settings.json'),
      fetch('colormaps.json'),
    ]);
    if (!simResp.ok)     throw new Error(`simulation.json: HTTP ${simResp.status}`);
    if (!modesResp.ok) throw new Error(`modes.json: HTTP ${modesResp.status}`);
    if (!settingsResp.ok)throw new Error(`settings.json: HTTP ${settingsResp.status}`);
    if (!cmapsResp.ok)   throw new Error(`colormaps.json: HTTP ${cmapsResp.status}`);
    simData = await simResp.json();
    window._modesData   = await modesResp.json();
    window._settingsData  = await settingsResp.json();
    window._colormapsData = await cmapsResp.json();
    document.getElementById('loading').style.display = 'none';
    init();
  } catch (e) {
    document.getElementById('loading').innerHTML =
      `<div style="color:#f66">Failed to load data<br><small>${e.message}</small><br><br>
       <small>Run the notebook first, then serve from project root:<br>
       <code>python -m http.server 8000</code></small></div>`;
  }
}

// ─── Terrain mesh ───────────────────────────────────────────────────────────
let terrainZMin = 0, terrainZMax = 1;

function buildTerrain(terrainData) {
  if (terrainMesh) { scene.remove(terrainMesh); terrainMesh.geometry.dispose(); }

  const { nx, ny, elevation, x_extent, y_extent } = terrainData;
  const elev = elevation;

  const geom = new THREE.PlaneGeometry(
    x_extent[1] - x_extent[0],
    y_extent[1] - y_extent[0],
    nx - 1, ny - 1
  );

  const pos = geom.attributes.position;
  for (let j = 0; j < ny; j++)
    for (let i = 0; i < nx; i++)
      pos.setZ(j * nx + i, elev[j][i]);
  pos.needsUpdate = true;
  geom.computeVertexNormals();

  terrainZMin = Infinity; terrainZMax = -Infinity;
  for (let i = 0; i < pos.count; i++) {
    const z = pos.getZ(i);
    if (z < terrainZMin) terrainZMin = z;
    if (z > terrainZMax) terrainZMax = z;
  }

  geom.setAttribute('color', new THREE.BufferAttribute(new Float32Array(pos.count * 3), 3));

  const mat = new THREE.MeshLambertMaterial({ vertexColors: true, transparent: true, opacity: 0.8 });
  window._terrainMat = mat;

  terrainMesh = new THREE.Mesh(geom, mat);
  terrainMesh.position.set((x_extent[0] + x_extent[1]) / 2, -(y_extent[0] + y_extent[1]) / 2, 0);
  terrainMesh.receiveShadow = true;
  scene.add(terrainMesh);

  const meanElev = elev.flat().reduce((a, b) => a + b, 0) / (nx * ny);
  controls.target.set(0, 0, meanElev);
  camera.position.set(0, -3000, meanElev + 1500);
  controls.update();
}

// ─── Colourmap utilities (driven by colormaps.json) ──────────────────────────
function hexToRgb01(hex) {
  return [
    parseInt(hex.slice(1, 3), 16) / 255,
    parseInt(hex.slice(3, 5), 16) / 255,
    parseInt(hex.slice(5, 7), 16) / 255,
  ];
}

function sampleColormap(stops, t) {
  if (!stops || stops.length === 0) return [0, 0, 0];
  t = Math.max(0, Math.min(1, t));
  let lo = stops[0], hi = stops[stops.length - 1];
  for (let i = 0; i < stops.length - 1; i++) {
    if (t <= stops[i + 1].t) { lo = stops[i]; hi = stops[i + 1]; break; }
  }
  const s = (hi.t === lo.t) ? 0 : (t - lo.t) / (hi.t - lo.t);
  const [r0, g0, b0] = hexToRgb01(lo.color);
  const [r1, g1, b1] = hexToRgb01(hi.color);
  return [r0 + s * (r1 - r0), g0 + s * (g1 - g0), b0 + s * (b1 - b0)];
}

// Generic colorbar: pixel-by-pixel from the same sampleColormap — guaranteed match.
function drawColorbar(canvasId, labelsId, cmapName, minVal, maxVal, fmtFn) {
  const stops = (window._colormapsData || {})[cmapName];
  if (!stops) return;
  const canvas = document.getElementById(canvasId);
  const ctx    = canvas.getContext('2d');
  const img    = ctx.createImageData(canvas.width, canvas.height);
  for (let py = 0; py < canvas.height; py++) {
    const t = 1 - py / (canvas.height - 1);   // top = maxVal
    const [r, g, b] = sampleColormap(stops, t);
    for (let px = 0; px < canvas.width; px++) {
      const idx = (py * canvas.width + px) * 4;
      img.data[idx]     = Math.round(r * 255);
      img.data[idx + 1] = Math.round(g * 255);
      img.data[idx + 2] = Math.round(b * 255);
      img.data[idx + 3] = 255;
    }
  }
  ctx.putImageData(img, 0, 0);
  const labelsDiv = document.getElementById(labelsId);
  labelsDiv.innerHTML = '';
  for (let k = 0; k <= 5; k++) {
    const val  = maxVal - (k / 5) * (maxVal - minVal);
    const span = document.createElement('span');
    span.textContent = fmtFn(val);
    labelsDiv.appendChild(span);
  }
}

function applyElevationColors() {
  if (!terrainMesh) return;
  const stops = (window._colormapsData || {}).elevation || [];
  const pos = terrainMesh.geometry.attributes.position;
  const arr = terrainMesh.geometry.attributes.color.array;
  for (let i = 0; i < pos.count; i++) {
    const t = (pos.getZ(i) - terrainZMin) / (terrainZMax - terrainZMin);
    const [r, g, b] = sampleColormap(stops, t);
    arr[i * 3] = r; arr[i * 3 + 1] = g; arr[i * 3 + 2] = b;
  }
  terrainMesh.geometry.attributes.color.needsUpdate = true;
}

function drawElevationColorbar() {
  drawColorbar('cb-elevation', 'cb-elevation-labels', 'elevation',
    terrainZMin, terrainZMax, v => v.toFixed(0) + ' m');
}

// ─── Heatmap overlay ────────────────────────────────────────────────────────
let heatmapMesh = null;

function buildHeatmap(terrainData) {
  if (heatmapMesh) { scene.remove(heatmapMesh); heatmapMesh.geometry.dispose(); heatmapMesh.material.dispose(); }

  const { nx, ny, elevation, x_extent, y_extent } = terrainData;

  const geom = new THREE.PlaneGeometry(
    x_extent[1] - x_extent[0],
    y_extent[1] - y_extent[0],
    nx - 1, ny - 1
  );

  // Match terrain elevation, lifted 3m to avoid z-fighting
  const pos = geom.attributes.position;
  for (let j = 0; j < ny; j++)
    for (let i = 0; i < nx; i++)
      pos.setZ(j * nx + i, elevation[j][i] + 3);
  pos.needsUpdate = true;

  const colors = new Float32Array(pos.count * 3);
  geom.setAttribute('color', new THREE.BufferAttribute(colors, 3));

  const mat = new THREE.MeshBasicMaterial({
    vertexColors: true,
    transparent: true,
    opacity: 0.7,
    depthWrite: false,
    side: THREE.FrontSide,
  });
  window._heatmapMat = mat;

  heatmapMesh = new THREE.Mesh(geom, mat);
  heatmapMesh.position.set(
    (x_extent[0] + x_extent[1]) / 2,
    -(y_extent[0] + y_extent[1]) / 2,
    0
  );
  scene.add(heatmapMesh);
}

// Global dT max across all scenarios — computed once so the colorbar scale
// stays fixed throughout the day and scenarios can be directly compared.
let globalMaxDT = 0;

function computeGlobalMaxDT() {
  if (!simData) return;
  const T = simData.terrain;
  globalMaxDT = 0;
  for (const sc of simData.scenarios)
    for (let j = 0; j < T.ny; j++)
      for (let i = 0; i < T.nx; i++)
        if (sc.ground_temp_anomaly[j][i] > globalMaxDT)
          globalMaxDT = sc.ground_temp_anomaly[j][i];
}

function updateHeatmapColors(scenarioIndex) {
  if (!heatmapMesh || !simData) return;
  const sc        = simData.scenarios[scenarioIndex];
  const T         = simData.terrain;
  const dT        = sc.ground_temp_anomaly;
  const stops     = (window._colormapsData || {}).thermal || [];
  const threshold = parseFloat(document.getElementById('trigger-threshold').value);
  const maxDT     = globalMaxDT || 1;

  const arr = heatmapMesh.geometry.attributes.color.array;
  for (let j = 0; j < T.ny; j++) {
    for (let i = 0; i < T.nx; i++) {
      const idx    = (j * T.nx + i) * 3;
      const dT_eff = Math.max(0, dT[j][i] - threshold);
      const [r, g, b] = sampleColormap(stops, dT_eff / maxDT);
      arr[idx] = r; arr[idx + 1] = g; arr[idx + 2] = b;
    }
  }
  heatmapMesh.geometry.attributes.color.needsUpdate = true;
  drawColorbar('cb-thermal', 'cb-thermal-labels', 'thermal', 0, maxDT, v => v.toFixed(1) + ' K');
}

// ─── Sun object ──────────────────────────────────────────────────────────────
let sunSphere = null;
let sunGlow   = null;
let sunLabelDiv = null;
const SUN_R = 7500; // distance from terrain centre to place sun sphere

function sunWorldPos(azDeg, elDeg, terrainCentreZ) {
  const az = azDeg * Math.PI / 180;
  const el = elDeg * Math.PI / 180;
  return new THREE.Vector3(
    SUN_R * Math.sin(az) * Math.cos(el),
    SUN_R * Math.cos(az) * Math.cos(el),     // North → Three.js Y
    terrainCentreZ + SUN_R * Math.sin(el)
  );
}

function buildSunObject() {
  // Sphere
  const geo  = new THREE.SphereGeometry(160, 16, 16);
  const mat  = new THREE.MeshBasicMaterial({ color: 0xffee88 });
  sunSphere  = new THREE.Mesh(geo, mat);
  scene.add(sunSphere);

  // Soft glow (larger transparent sphere around it)
  const glowGeo = new THREE.SphereGeometry(320, 16, 16);
  const glowMat = new THREE.MeshBasicMaterial({
    color: 0xffcc44, transparent: true, opacity: 0.18,
    blending: THREE.AdditiveBlending, depthWrite: false,
  });
  sunGlow = new THREE.Mesh(glowGeo, glowMat);
  scene.add(sunGlow);

  // HTML label
  sunLabelDiv = document.createElement('div');
  sunLabelDiv.style.cssText = `
    position: absolute; pointer-events: none;
    background: rgba(10,15,30,0.75); border: 1px solid #ffcc44;
    color: #ffee88; font-size: 11px; font-family: 'Segoe UI', sans-serif;
    padding: 2px 7px; border-radius: 4px; white-space: nowrap;
    transform: translate(-50%, -130%);
  `;
  document.getElementById('canvas-container').appendChild(sunLabelDiv);
}

function updateSunObject(scenarioIndex) {
  if (!simData) return;
  const sc = simData.scenarios[scenarioIndex];
  const cz = (terrainZMin + terrainZMax) / 2;
  const pos = sunWorldPos(sc.sun_azimuth, sc.sun_elevation, cz);

  sunSphere.position.copy(pos);
  sunGlow.position.copy(pos);

  // Update directional light to come from same direction
  sun.position.copy(pos);
  sun.shadow.camera.updateProjectionMatrix();

  // Update label text (position updated each frame in updateSunLabel)
  sunLabelDiv.textContent = `☀ ${sc.local_time || sc.name}  el ${sc.sun_elevation.toFixed(0)}°`;
}

// ─── Albedo overlay ──────────────────────────────────────────────────────────
let albedoMesh = null;

function buildAlbedoOverlay(terrainData) {
  if (albedoMesh) { scene.remove(albedoMesh); albedoMesh.geometry.dispose(); albedoMesh.material.dispose(); }
  if (!terrainData.thermal_factor) return;

  const { nx, ny, elevation, x_extent, y_extent, thermal_factor } = terrainData;
  const geom = new THREE.PlaneGeometry(
    x_extent[1] - x_extent[0], y_extent[1] - y_extent[0], nx - 1, ny - 1
  );
  const pos = geom.attributes.position;
  for (let j = 0; j < ny; j++)
    for (let i = 0; i < nx; i++)
      pos.setZ(j * nx + i, elevation[j][i] + 6);
  pos.needsUpdate = true;

  // Compute range
  let minTF = Infinity, maxTF = -Infinity;
  for (let j = 0; j < ny; j++)
    for (let i = 0; i < nx; i++) {
      const v = thermal_factor[j][i];
      if (v < minTF) minTF = v;
      if (v > maxTF) maxTF = v;
    }

  const colors = new Float32Array(pos.count * 3);
  for (let j = 0; j < ny; j++) {
    for (let i = 0; i < nx; i++) {
      const idx = (j * nx + i) * 3;
      const t = (thermal_factor[j][i] - minTF) / (maxTF - minTF);
      const [r, g, b] = sampleColormap((window._colormapsData || {}).albedo || [], t);
      colors[idx] = r; colors[idx + 1] = g; colors[idx + 2] = b;
    }
  }
  geom.setAttribute('color', new THREE.BufferAttribute(colors, 3));

  const mat = new THREE.MeshBasicMaterial({
    vertexColors: true, transparent: true, opacity: 0,
    depthWrite: false,
  });
  window._albedoMat = mat;

  albedoMesh = new THREE.Mesh(geom, mat);
  albedoMesh.position.set(
    (x_extent[0] + x_extent[1]) / 2, -(y_extent[0] + y_extent[1]) / 2, 0
  );
  scene.add(albedoMesh);
  drawColorbar('cb-albedo', 'cb-albedo-labels', 'albedo', minTF, maxTF, v => v.toFixed(2));
}

// ─── Slope overlay ────────────────────────────────────────────────────────────
let slopeMesh = null;
let slopeMax  = 45;
let slopeDegData = null;   // saved for point queries

function buildSlopeOverlay(terrainData) {
  if (slopeMesh) { scene.remove(slopeMesh); slopeMesh.geometry.dispose(); slopeMesh.material.dispose(); }

  const { nx, ny, elevation, x_extent, y_extent, dx, dy } = terrainData;
  const geom = new THREE.PlaneGeometry(
    x_extent[1] - x_extent[0], y_extent[1] - y_extent[0], nx - 1, ny - 1
  );
  const pos = geom.attributes.position;
  for (let j = 0; j < ny; j++)
    for (let i = 0; i < nx; i++)
      pos.setZ(j * nx + i, elevation[j][i] + 9);
  pos.needsUpdate = true;

  // Compute slope (degrees) via central differences
  slopeDegData = new Float32Array(ny * nx);
  const slopeDeg = slopeDegData;
  slopeMax = 0;
  for (let j = 0; j < ny; j++) {
    for (let i = 0; i < nx; i++) {
      const i0 = Math.max(0, i - 1), i1 = Math.min(nx - 1, i + 1);
      const j0 = Math.max(0, j - 1), j1 = Math.min(ny - 1, j + 1);
      const dzdx = (elevation[j][i1] - elevation[j][i0]) / ((i1 - i0) * dx);
      const dzdy = (elevation[j1][i] - elevation[j0][i]) / ((j1 - j0) * dy);
      const s = Math.atan(Math.sqrt(dzdx * dzdx + dzdy * dzdy)) * 180 / Math.PI;
      slopeDeg[j * nx + i] = s;
      if (s > slopeMax) slopeMax = s;
    }
  }

  const colors = new Float32Array(pos.count * 3);
  for (let j = 0; j < ny; j++) {
    for (let i = 0; i < nx; i++) {
      const idx = (j * nx + i) * 3;
      const t = slopeDeg[j * nx + i] / slopeMax;
      const [r, g, b] = sampleColormap((window._colormapsData || {}).slope || [], t);
      colors[idx] = r; colors[idx + 1] = g; colors[idx + 2] = b;
    }
  }
  geom.setAttribute('color', new THREE.BufferAttribute(colors, 3));

  const mat = new THREE.MeshBasicMaterial({
    vertexColors: true, transparent: true, opacity: 0,
    depthWrite: false,
  });
  window._slopeMat = mat;

  slopeMesh = new THREE.Mesh(geom, mat);
  slopeMesh.position.set(
    (x_extent[0] + x_extent[1]) / 2, -(y_extent[0] + y_extent[1]) / 2, 0
  );
  scene.add(slopeMesh);
  drawColorbar('cb-slope', 'cb-slope-labels', 'slope', 0, slopeMax, v => v.toFixed(0) + '°');
}

// ─── Neutral shading overlay (Lambert — responds to directional light) ────────
let neutralMesh = null;

function buildNeutralOverlay(terrainData) {
  if (neutralMesh) { scene.remove(neutralMesh); neutralMesh.geometry.dispose(); neutralMesh.material.dispose(); }

  const { nx, ny, elevation, x_extent, y_extent } = terrainData;
  const geom = new THREE.PlaneGeometry(
    x_extent[1] - x_extent[0], y_extent[1] - y_extent[0], nx - 1, ny - 1
  );
  const pos = geom.attributes.position;
  for (let j = 0; j < ny; j++)
    for (let i = 0; i < nx; i++)
      pos.setZ(j * nx + i, elevation[j][i] + 1);
  pos.needsUpdate = true;
  geom.computeVertexNormals();

  // MeshLambertMaterial: lit by the directional sun — slopes facing away go dark
  const mat = new THREE.MeshLambertMaterial({
    color: 0xc8b89a,          // warm limestone/sandstone tone
    transparent: true,
    opacity: 0,
    depthWrite: false,
  });
  window._neutralMat = mat;

  neutralMesh = new THREE.Mesh(geom, mat);
  neutralMesh.receiveShadow = true;
  neutralMesh.position.set(
    (x_extent[0] + x_extent[1]) / 2, -(y_extent[0] + y_extent[1]) / 2, 0
  );
  scene.add(neutralMesh);
}

// ─── Shadow overlay (MultiplyBlending — darkens terrain where DEM casts shadow) ─
let shadowMesh = null;

function buildShadowOverlay(terrainData) {
  if (shadowMesh) { scene.remove(shadowMesh); shadowMesh.geometry.dispose(); shadowMesh.material.dispose(); }

  const { nx, ny, elevation, x_extent, y_extent } = terrainData;
  const geom = new THREE.PlaneGeometry(
    x_extent[1] - x_extent[0], y_extent[1] - y_extent[0], nx - 1, ny - 1
  );
  const pos = geom.attributes.position;
  for (let j = 0; j < ny; j++)
    for (let i = 0; i < nx; i++)
      pos.setZ(j * nx + i, elevation[j][i] + 15);
  pos.needsUpdate = true;

  // Vertex colors: lit = (1,1,1) = multiply by 1 (invisible), shadow = (dark,dark,dark)
  const colors = new Float32Array(nx * ny * 3).fill(1);
  geom.setAttribute('color', new THREE.BufferAttribute(colors, 3));

  const mat = new THREE.MeshBasicMaterial({
    vertexColors: true,
    blending: THREE.MultiplyBlending,
    depthWrite: false,
    transparent: true,
  });

  shadowMesh = new THREE.Mesh(geom, mat);
  shadowMesh.renderOrder = 10;  // render after all overlays so MultiplyBlending darkens them
  shadowMesh.position.set(
    (x_extent[0] + x_extent[1]) / 2, -(y_extent[0] + y_extent[1]) / 2, 0
  );
  scene.add(shadowMesh);
}

function updateShadowColors(scenarioIndex) {
  if (!shadowMesh || !simData) return;
  const sc   = simData.scenarios[scenarioIndex];
  const T    = simData.terrain;
  const mask = sc.shadow_mask;
  if (!mask) return;

  const darkness = parseFloat(document.getElementById('shadow-darkness').value);
  const litVal   = 1.0;
  const shadVal  = 1.0 - darkness * 0.75;   // max 75 % darkening at slider = 1

  const arr = shadowMesh.geometry.attributes.color.array;
  for (let j = 0; j < T.ny; j++) {
    for (let i = 0; i < T.nx; i++) {
      const idx = (j * T.nx + i) * 3;
      const v   = mask[j * T.nx + i] ? shadVal : litVal;  // flat 1-D array
      arr[idx] = arr[idx + 1] = arr[idx + 2] = v;
    }
  }
  shadowMesh.geometry.attributes.color.needsUpdate = true;
}

// ─── Thermal top overlay ─────────────────────────────────────────────────────
// Computed in JS from ground_temp_anomaly + ELR slider — no Python re-run needed.
// h_top(i,j) = dT(i,j) / (DALR − ELR)   [metres AGL]
const DALR_JS = 0.0098;   // K/m — fixed by thermodynamics
const HTOP_MAX = 3000;     // m — colormap ceiling (cells above saturate to top colour)

let thermalTopMesh = null;

function buildThermalTopOverlay(terrainData) {
  if (thermalTopMesh) { scene.remove(thermalTopMesh); thermalTopMesh.geometry.dispose(); thermalTopMesh.material.dispose(); }

  const { nx, ny, elevation, x_extent, y_extent } = terrainData;
  const geom = new THREE.PlaneGeometry(
    x_extent[1] - x_extent[0], y_extent[1] - y_extent[0], nx - 1, ny - 1
  );
  const pos = geom.attributes.position;
  for (let j = 0; j < ny; j++)
    for (let i = 0; i < nx; i++)
      pos.setZ(j * nx + i, elevation[j][i] + 18);
  pos.needsUpdate = true;

  const colors = new Float32Array(nx * ny * 3);
  geom.setAttribute('color', new THREE.BufferAttribute(colors, 3));

  const mat = new THREE.MeshBasicMaterial({
    vertexColors: true, transparent: true, opacity: 0, depthWrite: false,
  });
  window._thermalTopMat = mat;

  thermalTopMesh = new THREE.Mesh(geom, mat);
  thermalTopMesh.position.set(
    (x_extent[0] + x_extent[1]) / 2, -(y_extent[0] + y_extent[1]) / 2, 0
  );
  scene.add(thermalTopMesh);
}

function updateThermalTopColors(scenarioIndex) {
  if (!thermalTopMesh || !simData) return;
  const sc        = simData.scenarios[scenarioIndex];
  const T         = simData.terrain;
  const dT        = sc.ground_temp_anomaly;
  const ELR       = parseFloat(document.getElementById('elr').value) / 1000;  // K/km → K/m
  const threshold = parseFloat(document.getElementById('trigger-threshold').value);
  const dLapse    = DALR_JS - ELR;
  if (dLapse <= 0) return;  // neutral/unstable atmosphere — no finite thermal top

  const stops = (window._colormapsData || {})['thermal-top'] || [];
  const arr   = thermalTopMesh.geometry.attributes.color.array;

  for (let j = 0; j < T.ny; j++) {
    for (let i = 0; i < T.nx; i++) {
      const idx    = (j * T.nx + i) * 3;
      const dT_eff = Math.max(0, dT[j][i] - threshold);
      const hTop   = dT_eff > 0 ? dT_eff / dLapse : 0;
      const [r, g, b] = sampleColormap(stops, hTop / HTOP_MAX);
      arr[idx] = r; arr[idx + 1] = g; arr[idx + 2] = b;
    }
  }
  thermalTopMesh.geometry.attributes.color.needsUpdate = true;
  drawColorbar('cb-thermal-top', 'cb-thermal-top-labels', 'thermal-top',
               0, HTOP_MAX, v => v.toFixed(0) + ' m');
}

// ─── Daily heat accumulation overlay ─────────────────────────────────────────
// Σ max(0, dT[scenario][j][i] − threshold) × interval_hours across all scenarios.
// Threshold-dependent — recomputes when trigger-threshold slider changes.

let heatAccumMesh = null;

function buildHeatAccumOverlay(terrainData) {
  if (heatAccumMesh) {
    scene.remove(heatAccumMesh);
    heatAccumMesh.geometry.dispose();
    heatAccumMesh.material.dispose();
  }
  const { nx, ny, elevation, x_extent, y_extent } = terrainData;
  const geom = new THREE.PlaneGeometry(
    x_extent[1] - x_extent[0], y_extent[1] - y_extent[0], nx - 1, ny - 1
  );
  const pos = geom.attributes.position;
  for (let j = 0; j < ny; j++)
    for (let i = 0; i < nx; i++)
      pos.setZ(j * nx + i, elevation[j][i] + 12);
  pos.needsUpdate = true;
  const colors = new Float32Array(nx * ny * 3);
  geom.setAttribute('color', new THREE.BufferAttribute(colors, 3));
  const mat = new THREE.MeshBasicMaterial({
    vertexColors: true, transparent: true, opacity: 0, depthWrite: false,
  });
  window._heatAccumMat = mat;
  heatAccumMesh = new THREE.Mesh(geom, mat);
  heatAccumMesh.position.set(
    (x_extent[0] + x_extent[1]) / 2, -(y_extent[0] + y_extent[1]) / 2, 0
  );
  scene.add(heatAccumMesh);
}

function updateHeatAccumColors() {
  if (!heatAccumMesh || !simData) return;
  const T         = simData.terrain;
  const threshold = parseFloat(document.getElementById('trigger-threshold').value);
  const intervalH = (simData.interval_min || 30) / 60;
  const stops     = (window._colormapsData || {})['heat-accum'] || [];

  const accum = new Float32Array(T.ny * T.nx);
  for (const sc of simData.scenarios) {
    const dT = sc.ground_temp_anomaly;
    for (let j = 0; j < T.ny; j++)
      for (let i = 0; i < T.nx; i++)
        accum[j * T.nx + i] += Math.max(0, dT[j][i] - threshold);
  }
  let maxAccum = 0;
  for (let k = 0; k < accum.length; k++) {
    accum[k] *= intervalH;
    if (accum[k] > maxAccum) maxAccum = accum[k];
  }
  if (maxAccum === 0) maxAccum = 1;

  const arr = heatAccumMesh.geometry.attributes.color.array;
  for (let k = 0; k < T.ny * T.nx; k++) {
    const [r, g, b] = sampleColormap(stops, accum[k] / maxAccum);
    arr[k * 3] = r; arr[k * 3 + 1] = g; arr[k * 3 + 2] = b;
  }
  heatAccumMesh.geometry.attributes.color.needsUpdate = true;
  drawColorbar('cb-heat-accum', 'cb-heat-accum-labels', 'heat-accum',
               0, maxAccum, v => v.toFixed(1) + ' K·h');
}

// ─── Orographic flow arrows ──────────────────────────────────────────────────
// LineSegments: 3 segments per arrow (shaft + 2 head wings) = 6 vertices each.
// Arrows are placed at downsampled grid points (arrow_step spacing).
// u_surface = eastward component (K-weighted), v_surface = southward component.

let flowArrows = null;
const FLOW_SCALE = 25;  // world units (metres) per K of smoothed flow magnitude

function buildFlowArrows(terrainData) {
  if (flowArrows) {
    scene.remove(flowArrows);
    flowArrows.geometry.dispose();
    flowArrows.material.dispose();
    flowArrows = null;
  }
  if (!simData || !simData.scenarios[0] || !simData.scenarios[0].u_surface) return;

  const T    = terrainData;
  const step = T.arrow_step || 8;

  // Build the index lists — same formula used in Python export
  const jIdx = [], iIdx = [];
  for (let j = Math.floor(step / 2); j < T.ny; j += step) jIdx.push(j);
  for (let i = Math.floor(step / 2); i < T.nx; i += step) iIdx.push(i);
  window._flowJIndices = jIdx;
  window._flowIIndices = iIdx;

  const numArrows = jIdx.length * iIdx.length;
  const positions = new Float32Array(numArrows * 6 * 3);  // 6 verts × 3 floats
  const colors    = new Float32Array(numArrows * 6 * 3);

  const geom = new THREE.BufferGeometry();
  geom.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  geom.setAttribute('color',    new THREE.BufferAttribute(colors,    3));

  const mat = new THREE.LineBasicMaterial({
    vertexColors: true, transparent: true, opacity: 0, depthWrite: false,
  });
  window._flowMat = mat;

  flowArrows = new THREE.LineSegments(geom, mat);
  scene.add(flowArrows);
}

function updateFlowArrows(scenarioIndex) {
  if (!flowArrows || !simData) return;
  const sc = simData.scenarios[scenarioIndex];
  if (!sc.u_surface || !sc.v_surface) return;

  const T         = simData.terrain;
  const threshold = parseFloat(document.getElementById('trigger-threshold').value);
  const jIdx      = window._flowJIndices;
  const iIdx      = window._flowIIndices;
  const U         = sc.u_surface;   // [jj][ii], eastward K
  const V         = sc.v_surface;   // [jj][ii], southward K
  const dT        = sc.ground_temp_anomaly;
  const stops     = (window._colormapsData || {}).thermal || [];

  const maxDT = globalMaxDT || 1;

  const pos = flowArrows.geometry.attributes.position.array;
  const col = flowArrows.geometry.attributes.color.array;
  let vi = 0;  // vertex counter

  for (let jj = 0; jj < jIdx.length; jj++) {
    const j = jIdx[jj];
    for (let ii = 0; ii < iIdx.length; ii++) {
      const i = iIdx[ii];

      // World-space base position (on terrain surface + small lift)
      const wx = T.x_extent[0] + i * T.dx;
      const wy = -(T.y_extent[0] + j * T.dy);
      const wz = T.elevation[j][i] + 25;

      // Flow vector: East → +x, South → −y in Three.js
      const dx_w = U[jj][ii] * FLOW_SCALE;
      const dy_w = -V[jj][ii] * FLOW_SCALE;
      const shaftLen = Math.sqrt(dx_w * dx_w + dy_w * dy_w);

      const tx = wx + dx_w;
      const ty = wy + dy_w;

      // Color by threshold-adjusted dT at this cell
      const dT_eff = Math.max(0, dT[j][i] - threshold);
      const [cr, cg, cb] = sampleColormap(stops, maxDT > 0 ? dT_eff / maxDT : 0);

      // Helper: write one vertex
      function writeVert(px, py) {
        pos[vi * 3] = px; pos[vi * 3 + 1] = py; pos[vi * 3 + 2] = wz;
        col[vi * 3] = cr; col[vi * 3 + 1] = cg; col[vi * 3 + 2] = cb;
        vi++;
      }

      // Shaft: base → tip
      writeVert(wx, wy);
      writeVert(tx, ty);

      if (shaftLen < 0.5) {
        // Degenerate (zero-flow) arrow — collapse head wings to same point
        writeVert(wx, wy); writeVert(wx, wy);
        writeVert(wx, wy); writeVert(wx, wy);
      } else {
        // Arrow-head wings: ±25° from backward direction at tip
        const ang = 25 * Math.PI / 180;
        const ux = dx_w / shaftLen, uy = dy_w / shaftLen;  // unit forward
        const headLen = Math.min(shaftLen * 0.40, 80);
        // Rotate unit-backward (−ux, −uy) by ±ang
        const lx = tx + headLen * (-ux * Math.cos(ang) + uy * Math.sin(ang));
        const ly = ty + headLen * (-ux * Math.sin(ang) - uy * Math.cos(ang));
        const rx = tx + headLen * (-ux * Math.cos(ang) - uy * Math.sin(ang));
        const ry = ty + headLen * ( ux * Math.sin(ang) - uy * Math.cos(ang));

        writeVert(tx, ty); writeVert(lx, ly);
        writeVert(tx, ty); writeVert(rx, ry);
      }
    }
  }

  flowArrows.geometry.attributes.position.needsUpdate = true;
  flowArrows.geometry.attributes.color.needsUpdate    = true;
}

// ─── Waypoint markers ────────────────────────────────────────────────────────
const MARKER_CONFIG = {
  landing: { color: 0x00ff88, label: '▼ Landing',  poleColor: 0x00cc66 },
  takeoff: { color: 0xff8800, label: '▲ Take-off', poleColor: 0xcc6600 },
};

const markerSprites = [];

function buildMarkers(markersData) {
  // Remove old markers
  markerSprites.forEach(s => scene.remove(s));
  markerSprites.length = 0;

  markersData.forEach(m => {
    const cfg = MARKER_CONFIG[m.type];
    if (!cfg) return;

    const elevation = m.z;

    // Vertical pole
    const poleH = 120;
    const poleGeo = new THREE.CylinderGeometry(4, 4, poleH, 8);
    const poleMat = new THREE.MeshLambertMaterial({ color: cfg.poleColor });
    const pole = new THREE.Mesh(poleGeo, poleMat);
    // CylinderGeometry is Y-up; we rotate so it stands along Z
    pole.rotation.x = Math.PI / 2;
    pole.position.set(m.x, -m.y, elevation + poleH / 2);
    scene.add(pole);
    markerSprites.push(pole);

    // Flag / cone on top
    const coneGeo = new THREE.ConeGeometry(40, 80, 12);
    const coneMat = new THREE.MeshLambertMaterial({ color: cfg.color });
    const cone = new THREE.Mesh(coneGeo, coneMat);
    cone.rotation.x = Math.PI / 2;  // point upward along Z
    cone.position.set(m.x, -m.y, elevation + poleH + 40);
    scene.add(cone);
    markerSprites.push(cone);

    // HTML label overlay (positioned each frame in animate)
    const div = document.createElement('div');
    div.style.cssText = `
      position: absolute; pointer-events: none;
      background: rgba(10,15,30,0.82); border: 1px solid ${cfg.color === 0x00ff88 ? '#00ff88' : '#ff8800'};
      color: ${cfg.color === 0x00ff88 ? '#00ff88' : '#ff8800'};
      font-size: 12px; font-weight: bold; font-family: 'Segoe UI', sans-serif;
      padding: 3px 8px; border-radius: 4px; white-space: nowrap;
      transform: translate(-50%, -100%); margin-top: -8px;
    `;
    div.textContent = `${cfg.label}  ${elevation.toFixed(0)}m`;
    document.getElementById('canvas-container').appendChild(div);

    // Store world position for projection each frame
    cone._labelDiv = div;
    cone._worldPos = new THREE.Vector3(m.x, -m.y, elevation + poleH + 90);
  });
}

function updateMarkerLabels() {
  const objs = [...markerSprites, ...(clickMarker || [])];
  objs.forEach(obj => {
    if (!obj._labelDiv) return;
    const pos = obj._worldPos.clone().project(camera);
    const x = (pos.x * 0.5 + 0.5) * window.innerWidth;
    const y = (-pos.y * 0.5 + 0.5) * window.innerHeight;
    obj._labelDiv.style.left = x + 'px';
    obj._labelDiv.style.top  = y + 'px';
    // Hide if behind camera
    obj._labelDiv.style.display = pos.z > 1 ? 'none' : 'block';
  });
}


// ─── Init ───────────────────────────────────────────────────────────────────
function init() {
  try {
  computeGlobalMaxDT();
  buildTerrain(simData.terrain);
  applyElevationColors();
  drawElevationColorbar();
  buildHeatmap(simData.terrain);
  updateHeatmapColors(0);
  buildMarkers(simData.markers || []);
  buildAlbedoOverlay(simData.terrain);
  buildSlopeOverlay(simData.terrain);
  buildNeutralOverlay(simData.terrain);
  buildShadowOverlay(simData.terrain);
  buildThermalTopOverlay(simData.terrain);
  buildHeatAccumOverlay(simData.terrain);
  buildFlowArrows(simData.terrain);
  buildSunObject();
  updateSunObject(0);
  updateShadowColors(0);
  updateThermalTopColors(0);
  updateHeatAccumColors();
  updateFlowArrows(0);
  applySettings();
  buildmodeButtons();
  // Apply first mode values + visibility silently
  if (window._modesData && window._modesData.length > 0) {
    const firstMode = window._modesData[0];
    for (const [id, val] of Object.entries(firstMode.sliders)) setSlider(id, val);
    applySliderVisibility(firstMode);
  }
  buildTimeSlider();
  } catch (e) { console.error('init() error:', e); }
  animate();
}

// ─── modes ──────────────────────────────────────────────────────────────────
function markModified() {
  const active = document.querySelector('.mode-btn.active');
  if (active) active.classList.add('modified');
}

// Show only the control-groups listed in mode.sliders_visible; hide the rest.
function applySliderVisibility(mode) {
  const visible = new Set(mode.sliders_visible || []);
  document.querySelectorAll('.control-group[data-for]').forEach(group => {
    group.style.display = visible.has(group.dataset.for) ? '' : 'none';
  });
}

function buildmodeButtons() {
  const modes = window._modesData || [];
  const container = document.getElementById('mode-buttons');
  container.innerHTML = '';

  modes.forEach((mode, i) => {
    const btn = document.createElement('button');
    btn.className = 'mode-btn' + (i === 0 ? ' active' : '');
    btn.textContent = mode.label;
    btn.title = mode.tip || '';
    btn.onclick = () => {
      document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active', 'modified'));
      btn.classList.add('active');
      for (const [id, val] of Object.entries(mode.sliders)) setSlider(id, val);
      applySliderVisibility(mode);
    };
    container.appendChild(btn);
  });
}

function buildTimeSlider() {
  const slider = document.getElementById('time-slider');
  slider.max   = simData.scenarios.length - 1;
  slider.value = 0;

  function applyScenario(i) {
    currentScenario = i;
    const sc = simData.scenarios[i];
    document.getElementById('time-display').textContent = sc.local_time || sc.name;
    document.getElementById('sun-pos-info').textContent =
      `az ${sc.sun_azimuth.toFixed(0)}°  ·  el ${sc.sun_elevation.toFixed(0)}°  ·  ${simData.simulation_date || ''}`;
    updateHeatmapColors(i);
    updateSunObject(i);
    updateShadowColors(i);
    updateThermalTopColors(i);
    updateFlowArrows(i);
    if (_lastGi !== null) drawPlumeProfile(_lastGi, _lastGj);
  }

  slider.addEventListener('input', e => applyScenario(parseInt(e.target.value)));
  applyScenario(0);
}

// ─── Settings (min/max/step/decimals from settings.json) ─────────────────────
function applySettings() {
  const settings = window._settingsData;
  if (!settings) return;
  window._settingmode = true;
  for (const [id, cfg] of Object.entries(settings)) {
    const el = document.getElementById(id);
    if (!el) continue;
    if (cfg.min      !== undefined) el.min              = cfg.min;
    if (cfg.max      !== undefined) el.max              = cfg.max;
    if (cfg.step     !== undefined) el.step             = cfg.step;
    if (cfg.decimals !== undefined) el.dataset.decimals = cfg.decimals;
  }
  window._settingmode = false;
}

// ─── Slider helpers ───────────────────────────────────────────────────────────
// Flag: true while setSlider is programmatically changing a value,
// so the global 'input' listener doesn't wrongly mark it as Manual.
window._settingmode = false;

function setSlider(id, val) {
  window._settingmode = true;
  const el = document.getElementById(id);
  if (el) { el.value = val; el.dispatchEvent(new Event('input')); }
  window._settingmode = false;
}

// Any manual slider interaction → shade the active mode to show it's been modified
document.addEventListener('input', e => {
  if (e.target.type === 'range' && !window._settingmode) markModified();
}, true /* capture phase — fires before individual listeners */);

// ─── Point inspection ────────────────────────────────────────────────────────
const raycaster = new THREE.Raycaster();
const _mouse    = new THREE.Vector2();
const infoPanel = document.getElementById('info-panel');
let _mouseDownX = 0, _mouseDownY = 0;
let clickMarker = null;   // 3D marker at the last clicked point

function buildClickMarker(x, y, z, elevM) {
  if (clickMarker) {
    clickMarker.forEach(m => {
      scene.remove(m);
      if (m._labelDiv) m._labelDiv.remove();
    });
  }
  const color = 0x4488ff;
  const poleH = 120;

  const pole = new THREE.Mesh(
    new THREE.CylinderGeometry(4, 4, poleH, 8),
    new THREE.MeshLambertMaterial({ color })
  );
  pole.rotation.x = Math.PI / 2;
  pole.position.set(x, y, z + poleH / 2);

  const cone = new THREE.Mesh(
    new THREE.ConeGeometry(40, 80, 12),
    new THREE.MeshLambertMaterial({ color })
  );
  cone.rotation.x = Math.PI / 2;
  cone.position.set(x, y, z + poleH + 40);

  // HTML label
  const div = document.createElement('div');
  div.style.cssText = `
    position: absolute; pointer-events: none;
    background: rgba(10,15,30,0.82); border: 1px solid #4488ff;
    color: #4488ff;
    font-size: 12px; font-weight: bold; font-family: 'Segoe UI', sans-serif;
    padding: 3px 8px; border-radius: 4px; white-space: nowrap;
    transform: translate(-50%, -100%); margin-top: -8px;
  `;
  div.textContent = `▶ Selected ${elevM !== undefined ? elevM.toFixed(0) + 'm' : ''}`;
  document.getElementById('canvas-container').appendChild(div);
  cone._labelDiv = div;
  cone._worldPos = new THREE.Vector3(x, y, z + poleH + 90);

  scene.add(pole, cone);
  clickMarker = [pole, cone];
}

let _lastGi = null, _lastGj = null, _lastPt = null;

// ─── Thermal plume profile ────────────────────────────────────────────────────
// Shape: spindle (thermal bubble) — r(z) = r_max * 4*(z/H)*(1-z/H)
// Temperature: linear decay dT(z) = dT0 * (1 - z/H)
// H = thermal top AGL = dT0 / (DALR - ELR)
function drawPlumeProfile(gi, gj) {
  const plumeSection = document.getElementById('plume-section');
  const canvas  = document.getElementById('plume-canvas');
  const labelsEl = document.getElementById('plume-alt-labels');
  if (!canvas || !simData) return;

  const T   = simData.terrain;
  const dT0 = simData.scenarios[currentScenario].ground_temp_anomaly[gj][gi];
  const ELR = parseFloat(document.getElementById('elr').value) / 1000;
  const dLapse = DALR_JS - ELR;
  const threshold = parseFloat(document.getElementById('trigger-threshold').value);
  const dT_eff = Math.max(0, dT0 - threshold);
  const zTop = (dLapse > 0 && dT_eff > 0) ? dT_eff / dLapse : 0;

  const elev = simData.terrain.elevation[gj][gi];

  // Fixed Y axis (MSL) — same regardless of which cell is selected
  // Bottom = lowest terrain point on map, top = highest terrain + tallest thermal
  const zAxisMax = (dLapse > 0 && globalMaxDT > threshold)
    ? Math.max(0, globalMaxDT - threshold) / dLapse
    : (zTop > 0 ? zTop : 1000);
  const axisBottom = terrainZMin;
  const axisTop    = terrainZMax + zAxisMax;
  const axisSpan   = axisTop - axisBottom;

  // Helper: MSL altitude → canvas Y pixel
  const altToY = alt => PAD_TOP + (1 - (alt - axisBottom) / axisSpan) * drawH;

  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const PAD_TOP = 8, PAD_BTM = 4, PAD_LR = 4;
  const drawH = H - PAD_TOP - PAD_BTM;
  const cx = W / 2;

  ctx.clearRect(0, 0, W, H);

  // Background
  ctx.fillStyle = 'rgba(8,12,24,0.9)';
  ctx.fillRect(0, 0, W, H);

  // Grid lines at round MSL altitudes
  ctx.strokeStyle = 'rgba(80,120,160,0.2)';
  ctx.lineWidth = 1;
  const gridStep = Math.pow(10, Math.floor(Math.log10(axisSpan / 4)));
  const gridStart = Math.ceil(axisBottom / gridStep) * gridStep;
  for (let alt = gridStart; alt <= axisTop; alt += gridStep) {
    const y = altToY(alt);
    ctx.beginPath(); ctx.moveTo(PAD_LR, y); ctx.lineTo(W - PAD_LR, y); ctx.stroke();
  }

  // Centre axis
  ctx.strokeStyle = 'rgba(80,120,160,0.4)';
  ctx.beginPath(); ctx.moveTo(cx, PAD_TOP); ctx.lineTo(cx, PAD_TOP + drawH); ctx.stroke();

  const stops = (window._colormapsData || {}).thermal || [];

  const rMaxFrac = 0.42 * (dT_eff / (globalMaxDT || 1));
  const rMaxPx   = (W / 2 - PAD_LR) * rMaxFrac;

  if (zTop > 0) {
    // Draw plume row by row in MSL coordinates
    for (let py = 0; py < drawH; py++) {
      const altMSL = axisTop - (py / drawH) * axisSpan;
      const z_agl  = altMSL - elev;              // AGL from this cell's ground
      if (z_agl <= 0 || z_agl > zTop) continue;  // below ground or above ceiling
      const zFrac = z_agl / zTop;
      const dTz   = dT_eff * (1 - zFrac);
      const rFrac = 4 * zFrac * (1 - zFrac);
      const rPx   = rMaxPx * rFrac;
      const [r, g, b] = sampleColormap(stops, dTz / (globalMaxDT || 1));
      ctx.fillStyle = `rgba(${(r*255)|0},${(g*255)|0},${(b*255)|0},0.85)`;
      ctx.fillRect(cx - rPx, PAD_TOP + py, rPx * 2, 1);
    }

    // Thermal ceiling dashed line
    const ceilY = altToY(elev + zTop);
    ctx.setLineDash([3, 3]);
    ctx.strokeStyle = 'rgba(180,220,255,0.6)';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(PAD_LR, ceilY); ctx.lineTo(W - PAD_LR, ceilY); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = 'rgba(180,220,255,0.8)';
    ctx.font = '9px monospace';
    ctx.textAlign = 'left';
    ctx.fillText(`${(elev + zTop).toFixed(0)} m`, PAD_LR + 2, ceilY - 2);
    ctx.fillStyle = 'rgba(120,160,200,0.6)';
    ctx.fillText(`+${zTop.toFixed(0)} AGL`, PAD_LR + 2, ceilY + 8);
  } else {
    ctx.fillStyle = 'rgba(80,100,120,0.7)';
    ctx.font = '11px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('No thermal', cx, PAD_TOP + drawH / 2);
  }

  // Ground level dotted line for this cell
  const groundY = altToY(elev);
  ctx.setLineDash([2, 4]);
  ctx.strokeStyle = 'rgba(140,180,100,0.7)';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(PAD_LR, groundY); ctx.lineTo(W - PAD_LR, groundY); ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle = 'rgba(140,180,100,0.8)';
  ctx.font = '9px monospace';
  ctx.textAlign = 'right';
  ctx.fillText(`${elev.toFixed(0)} m`, W - PAD_LR - 2, groundY - 2);

  // Altitude labels on left (fixed MSL axis)
  labelsEl.innerHTML = '';
  const nLabels = 5;
  for (let k = 0; k <= nLabels; k++) {
    const span = document.createElement('span');
    span.textContent = (axisTop - (k / nLabels) * axisSpan).toFixed(0);
    labelsEl.appendChild(span);
  }

  plumeSection.style.display = '';
}

function updateInfoPanel(pt, gi, gj) {
  _lastGi = gi; _lastGj = gj; _lastPt = pt;
  const T      = simData.terrain;
  const elev   = T.elevation[gj][gi];
  const tf     = T.thermal_factor ? T.thermal_factor[gj][gi].toFixed(2) : '—';
  const dT     = simData.scenarios[currentScenario].ground_temp_anomaly[gj][gi];
  const slope  = slopeDegData ? slopeDegData[gj * T.nx + gi].toFixed(1) : '—';
  const scName = simData.scenarios[currentScenario].name;

  const R   = 6371000;
  const lat = T.projection_origin.lat - (-pt.y) * 180 / (Math.PI * R);
  const lon = T.projection_origin.lon +   pt.x  * 180 / (Math.PI * R * Math.cos(T.projection_origin.lat * Math.PI / 180));

  document.getElementById('info-rows').innerHTML = `
    <h2>Selected point</h2>
    <div class="info-coords">${lat.toFixed(5)}° N &nbsp; ${lon.toFixed(5)}° E</div>
    <div class="info-row"><span class="info-label">Elevation</span>      <span class="info-val">${elev.toFixed(0)} m</span></div>
    <div class="info-row"><span class="info-label">Slope</span>          <span class="info-val">${slope}°</span></div>
    <div class="info-row"><span class="info-label">Thermal factor</span> <span class="info-val">${tf}</span></div>
    <div class="info-row"><span class="info-label">Thermal ΔT</span>     <span class="info-val">${dT.toFixed(1)} K</span></div>
    <div class="info-row"><span class="info-label">Scenario</span>       <span class="info-val">${scName}</span></div>
  `;
  infoPanel.style.display = 'block';
  drawPlumeProfile(gi, gj);
}

renderer.domElement.addEventListener('mousedown', e => {
  _mouseDownX = e.clientX; _mouseDownY = e.clientY;
});

renderer.domElement.addEventListener('click', e => {
  if (Math.hypot(e.clientX - _mouseDownX, e.clientY - _mouseDownY) > 5) return;
  if (!terrainMesh || !simData) return;

  const rect = renderer.domElement.getBoundingClientRect();
  _mouse.x =  ((e.clientX - rect.left) / rect.width)  * 2 - 1;
  _mouse.y = -((e.clientY - rect.top)  / rect.height) * 2 + 1;

  raycaster.setFromCamera(_mouse, camera);
  const hits = raycaster.intersectObject(terrainMesh);
  if (!hits.length) {
    infoPanel.style.display = 'none';
    if (clickMarker) { clickMarker.forEach(m => { scene.remove(m); if (m._labelDiv) m._labelDiv.remove(); }); clickMarker = null; }
    return;
  }

  const pt = hits[0].point;
  const T  = simData.terrain;
  const gi = Math.round((pt.x - T.x_extent[0]) / T.dx);
  const gj = Math.round((-pt.y - T.y_extent[0]) / T.dy);
  if (gi < 0 || gi >= T.nx || gj < 0 || gj >= T.ny) return;

  const elev = T.elevation[gj][gi];
  buildClickMarker(pt.x, pt.y, elev, elev);
  updateInfoPanel(pt, gi, gj);
});

// ─── Animate ────────────────────────────────────────────────────────────────
function updateSunLabel() {
  if (!sunSphere || !sunLabelDiv) return;
  const projected = sunSphere.position.clone().project(camera);
  const x = (projected.x * 0.5 + 0.5) * window.innerWidth;
  const y = (-projected.y * 0.5 + 0.5) * window.innerHeight;
  sunLabelDiv.style.left = x + 'px';
  sunLabelDiv.style.top  = y + 'px';
  sunLabelDiv.style.display = projected.z > 1 ? 'none' : 'block';
}

function animate() {
  requestAnimationFrame(animate);
  controls.update();
  updateMarkerLabels();
  updateSunLabel();
  renderer.render(scene, camera);
}

// Resize
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

loadData();
</script>
