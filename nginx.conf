server {
    listen 108;
    server_name localhost;

    # Root directory for your paragliding heatmap web files
    root /usr/share/nginx/html;
    index index.html;

    # 1. Serve static files with no-cache headers for dev/updates
    location / {
        try_files $uri $uri/ =404;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # 2. The Proxy Endpoint: /proxy?url=https://...
    location /proxy {
        # Extract the 'url' parameter from the query string
        set $target_url $arg_url;

        # Basic security: Only allow specific domains
        if ($target_url !~* "^https?://(archive-api\.open-meteo\.com|api\.open-meteo\.com|esa-worldcover\.s3\.eu-central-1\.amazonaws\.com)") {
            return 403 "Forbidden: Host not in allowlist";
        }

        # Proxy the request
        proxy_pass $target_url;
        
        # Forward necessary headers for Cloud Optimized GeoTIFFs (COGs)
        proxy_set_header Range $http_range;
        proxy_pass_header Content-Range;
        proxy_pass_header Accept-Ranges;
        
        # CORS Headers for the browser
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Range, Content-Type' always;
        
        # Handle preflight OPTIONS requests
        if ($request_method = 'OPTIONS') {
            return 204;
        }

        # Resolver for DNS (use Google or Docker's internal DNS)
        resolver 8.8.8.8;
    }
}