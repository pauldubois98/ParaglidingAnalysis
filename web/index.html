<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Paragliding Thermal Heatmap — Arbas</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0f1a; color: #e0e8f0; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
    #canvas-container { width: 100vw; height: 100vh; position: relative; }
    canvas { display: block; }

    #ui-panel {
      position: absolute;
      top: 16px; right: 16px;
      width: 260px;
      background: rgba(10,15,30,0.85);
      border: 1px solid rgba(100,160,255,0.3);
      border-radius: 12px;
      padding: 16px;
      backdrop-filter: blur(8px);
    }
    #ui-panel h2 {
      font-size: 14px;
      color: #7eb8ff;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 12px;
    }
    .control-group { margin-bottom: 12px; }
    .control-group label {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: #99b8d0;
      margin-bottom: 4px;
    }
    .control-group label span { color: #7eb8ff; font-weight: bold; }
    input[type="range"] {
      width: 100%;
      -webkit-appearance: none;
      height: 4px;
      background: rgba(100,160,255,0.2);
      border-radius: 2px;
      outline: none;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px; height: 14px;
      border-radius: 50%;
      background: #7eb8ff;
      cursor: pointer;
    }
    .scenario-btn {
      display: inline-block;
      padding: 4px 10px;
      margin: 3px 2px;
      font-size: 11px;
      border: 1px solid rgba(100,160,255,0.4);
      border-radius: 20px;
      cursor: pointer;
      color: #99b8d0;
      background: transparent;
      transition: all 0.2s;
    }
    .scenario-btn.active { background: #7eb8ff; color: #0a0f1a; border-color: #7eb8ff; }
    #status {
      position: absolute;
      bottom: 16px; left: 16px;
      font-size: 11px;
      color: rgba(150,180,220,0.6);
    }
    #colorbars {
      position: absolute;
      bottom: 24px; right: 20px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: flex-end;
      justify-content: flex-end;
      max-width: 420px;
    }
    .preset-btn {
      display: inline-block;
      padding: 4px 9px;
      margin: 3px 2px;
      font-size: 11px;
      border: 1px solid rgba(255,200,80,0.4);
      border-radius: 20px;
      cursor: pointer;
      color: #d0b870;
      background: transparent;
      transition: all 0.2s;
    }
    .preset-btn.active { background: #c8a040; color: #0a0f1a; border-color: #c8a040; }
    .colorbar {
      background: rgba(10,15,30,0.82);
      border: 1px solid rgba(100,160,255,0.2);
      border-radius: 8px;
      padding: 10px 12px;
    }
    .colorbar-title {
      text-align: center;
      margin-bottom: 6px;
      font-weight: bold;
      color: #7eb8ff;
      font-size: 11px;
    }
    .colorbar-body {
      display: flex;
      gap: 6px;
      align-items: stretch;
    }
    .colorbar-canvas { border-radius: 3px; }
    .colorbar-labels {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      font-size: 10px;
      color: #99b8d0;
      line-height: 1;
    }
    #loading {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      color: #7eb8ff;
    }
    #loading .spinner {
      width: 40px; height: 40px;
      border: 3px solid rgba(126,184,255,0.2);
      border-top-color: #7eb8ff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div id="canvas-container">
  <div id="loading">
    <div class="spinner"></div>
    <div>Loading simulation data...</div>
  </div>
</div>

<div id="ui-panel">
  <h2>Arbas Thermals</h2>

  <div class="control-group">
    <label>Scenario</label>
    <div id="scenario-buttons"></div>
  </div>

  <div class="control-group">
    <label>Preset</label>
    <div id="preset-buttons"></div>
  </div>

  <div class="control-group">
    <label>Terrain opacity <span id="terrain-opacity-val">0.8</span></label>
    <input type="range" id="terrain-opacity" min="0" max="1" step="0.05" value="0.8">
  </div>

  <div class="control-group">
    <label>Heatmap opacity <span id="heatmap-opacity-val">0.7</span></label>
    <input type="range" id="heatmap-opacity" min="0" max="1" step="0.05" value="0.7">
  </div>

  <div class="control-group">
    <label>Ambient light <span id="ambient-intensity-val">2.0</span></label>
    <input type="range" id="ambient-intensity" min="0" max="6" step="0.1" value="2.0">
  </div>

  <div class="control-group">
    <label>Sun intensity <span id="sun-intensity-val">3.0</span></label>
    <input type="range" id="sun-intensity" min="0" max="8" step="0.1" value="3.0">
  </div>

  <div class="control-group">
    <label>Albedo opacity <span id="albedo-opacity-val">0.00</span></label>
    <input type="range" id="albedo-opacity" min="0" max="1" step="0.05" value="0">
  </div>

  <div class="control-group">
    <label>Slope opacity <span id="slope-opacity-val">0.00</span></label>
    <input type="range" id="slope-opacity" min="0" max="1" step="0.05" value="0">
  </div>

  <div class="control-group">
    <label>Sun shading opacity <span id="neutral-opacity-val">0.00</span></label>
    <input type="range" id="neutral-opacity" min="0" max="1" step="0.05" value="0">
  </div>

  <div class="control-group" style="margin-top:10px; font-size:11px; color:#668; line-height:1.5">
    Drag to rotate · Scroll to zoom · Right-drag to pan
  </div>
</div>

<div id="colorbars">
  <div class="colorbar" id="cb-elevation-wrap">
    <div class="colorbar-title">Elevation (m)</div>
    <div class="colorbar-body">
      <canvas class="colorbar-canvas" id="cb-elevation" width="20" height="180"></canvas>
      <div class="colorbar-labels" id="cb-elevation-labels"></div>
    </div>
  </div>
  <div class="colorbar" id="cb-thermal-wrap">
    <div class="colorbar-title">Thermal ΔT (K)</div>
    <div class="colorbar-body">
      <canvas class="colorbar-canvas" id="cb-thermal" width="20" height="180"></canvas>
      <div class="colorbar-labels" id="cb-thermal-labels"></div>
    </div>
  </div>
  <div class="colorbar" id="cb-albedo-wrap" style="display:none">
    <div class="colorbar-title">Thermal factor</div>
    <div class="colorbar-body">
      <canvas class="colorbar-canvas" id="cb-albedo" width="20" height="180"></canvas>
      <div class="colorbar-labels" id="cb-albedo-labels"></div>
    </div>
  </div>
  <div class="colorbar" id="cb-slope-wrap" style="display:none">
    <div class="colorbar-title">Slope (°)</div>
    <div class="colorbar-body">
      <canvas class="colorbar-canvas" id="cb-slope" width="20" height="180"></canvas>
      <div class="colorbar-labels" id="cb-slope-labels"></div>
    </div>
  </div>
</div>

<div id="status">Drag to orbit · Scroll to zoom</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.169.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.169.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ─── Scene setup ───────────────────────────────────────────────────────────
const container = document.getElementById('canvas-container');
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
container.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x040810);
scene.fog = new THREE.Fog(0x040810, 8000, 18000);

const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 10, 30000);
camera.position.set(0, -2500, 2500);
camera.up.set(0, 0, 1);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 0, 800);
controls.enableDamping = true;
controls.dampingFactor = 0.06;
controls.minDistance = 200;
controls.maxDistance = 12000;
controls.maxPolarAngle = Math.PI * 0.48;

// Lighting
const ambientLight = new THREE.AmbientLight(0x1a2a3a, 2);
scene.add(ambientLight);
const sun = new THREE.DirectionalLight(0xfff0dd, 3);
sun.position.set(1000, -500, 2000);
sun.castShadow = true;
// Shadow map — high resolution, frustum tightly fitted to terrain extent
sun.shadow.mapSize.width  = 4096;
sun.shadow.mapSize.height = 4096;
sun.shadow.camera.left   = -5500;
sun.shadow.camera.right  =  5500;
sun.shadow.camera.top    =  5500;
sun.shadow.camera.bottom = -5500;
sun.shadow.camera.near   = 100;
sun.shadow.camera.far    = 18000;
sun.shadow.bias          = -0.002;   // prevents shadow acne on large terrain
scene.add(sun);

// ─── Data ──────────────────────────────────────────────────────────────────
let simData = null;
let currentScenario = 0;
let terrainMesh = null;

// ─── Load simulation data ───────────────────────────────────────────────────
async function loadData() {
  try {
    const [simResp, presetsResp] = await Promise.all([
      fetch('../data/simulation.json'),
      fetch('presets.json'),
    ]);
    if (!simResp.ok) throw new Error(`simulation.json: HTTP ${simResp.status}`);
    if (!presetsResp.ok) throw new Error(`presets.json: HTTP ${presetsResp.status}`);
    simData = await simResp.json();
    window._presetsData = await presetsResp.json();
    document.getElementById('loading').style.display = 'none';
    init();
  } catch (e) {
    document.getElementById('loading').innerHTML =
      `<div style="color:#f66">Failed to load data<br><small>${e.message}</small><br><br>
       <small>Run the notebook first, then serve from project root:<br>
       <code>python -m http.server 8000</code></small></div>`;
  }
}

// ─── Terrain mesh ───────────────────────────────────────────────────────────
let terrainZMin = 0, terrainZMax = 1;

function buildTerrain(terrainData) {
  if (terrainMesh) { scene.remove(terrainMesh); terrainMesh.geometry.dispose(); }

  const { nx, ny, elevation, x_extent, y_extent } = terrainData;
  const elev = elevation;

  const geom = new THREE.PlaneGeometry(
    x_extent[1] - x_extent[0],
    y_extent[1] - y_extent[0],
    nx - 1, ny - 1
  );

  const pos = geom.attributes.position;
  for (let j = 0; j < ny; j++)
    for (let i = 0; i < nx; i++)
      pos.setZ(j * nx + i, elev[j][i]);
  pos.needsUpdate = true;
  geom.computeVertexNormals();

  terrainZMin = Infinity; terrainZMax = -Infinity;
  for (let i = 0; i < pos.count; i++) {
    const z = pos.getZ(i);
    if (z < terrainZMin) terrainZMin = z;
    if (z > terrainZMax) terrainZMax = z;
  }

  geom.setAttribute('color', new THREE.BufferAttribute(new Float32Array(pos.count * 3), 3));

  const mat = new THREE.MeshLambertMaterial({ vertexColors: true, transparent: true, opacity: 0.8 });
  window._terrainMat = mat;

  terrainMesh = new THREE.Mesh(geom, mat);
  terrainMesh.position.set((x_extent[0] + x_extent[1]) / 2, -(y_extent[0] + y_extent[1]) / 2, 0);
  terrainMesh.receiveShadow = true;
  scene.add(terrainMesh);

  const meanElev = elev.flat().reduce((a, b) => a + b, 0) / (nx * ny);
  controls.target.set(0, 0, meanElev);
  camera.position.set(0, -3000, meanElev + 1500);
  controls.update();
}

function applyElevationColors() {
  if (!terrainMesh) return;
  const pos = terrainMesh.geometry.attributes.position;
  const arr = terrainMesh.geometry.attributes.color.array;
  const c = new THREE.Color();
  for (let i = 0; i < pos.count; i++) {
    const t = (pos.getZ(i) - terrainZMin) / (terrainZMax - terrainZMin);
    if (t < 0.35)      c.setRGB(0.15 + t * 0.4,  0.30 + t * 0.25, 0.08 + t * 0.05);
    else if (t < 0.65) c.setRGB(0.28 + t * 0.3,  0.28 + t * 0.1,  0.15 + t * 0.2);
    else               c.setRGB(0.55 + t * 0.45, 0.55 + t * 0.35, 0.55 + t * 0.45);
    arr[i * 3] = c.r; arr[i * 3 + 1] = c.g; arr[i * 3 + 2] = c.b;
  }
  terrainMesh.geometry.attributes.color.needsUpdate = true;
}

// ─── Colorbars ───────────────────────────────────────────────────────────────
function drawElevationColorbar() {
  const canvas = document.getElementById('cb-elevation');
  const ctx = canvas.getContext('2d');
  const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
  grad.addColorStop(0,    'rgb(230,230,230)');
  grad.addColorStop(0.35, 'rgb(140,110,90)');
  grad.addColorStop(0.65, 'rgb(100,80,50)');
  grad.addColorStop(1,    'rgb(40,90,25)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  const labelsDiv = document.getElementById('cb-elevation-labels');
  labelsDiv.innerHTML = '';
  for (let k = 0; k <= 5; k++) {
    const val = terrainZMax - (k / 5) * (terrainZMax - terrainZMin);
    const span = document.createElement('span');
    span.textContent = val.toFixed(0);
    labelsDiv.appendChild(span);
  }
}

function drawThermalColorbar(maxDT) {
  const canvas = document.getElementById('cb-thermal');
  const ctx = canvas.getContext('2d');
  const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
  grad.addColorStop(0,    'rgb(255,255,255)');
  grad.addColorStop(0.33, 'rgb(255,170,0)');
  grad.addColorStop(0.67, 'rgb(180,20,0)');
  grad.addColorStop(1,    'rgb(0,0,0)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  const labelsDiv = document.getElementById('cb-thermal-labels');
  labelsDiv.innerHTML = '';
  for (let k = 0; k <= 5; k++) {
    const val = maxDT - (k / 5) * maxDT;
    const span = document.createElement('span');
    span.textContent = val.toFixed(1);
    labelsDiv.appendChild(span);
  }
}

function drawAlbedoColorbar(minVal, maxVal) {
  const canvas = document.getElementById('cb-albedo');
  const ctx = canvas.getContext('2d');
  const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
  // Low factor (trees/water) → blue-green; high (rock) → orange-red
  grad.addColorStop(0,    'rgb(220,60,20)');   // high thermal factor (top)
  grad.addColorStop(0.4,  'rgb(240,190,0)');
  grad.addColorStop(0.7,  'rgb(80,180,80)');
  grad.addColorStop(1,    'rgb(0,80,200)');    // low thermal factor (bottom)
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  const labelsDiv = document.getElementById('cb-albedo-labels');
  labelsDiv.innerHTML = '';
  for (let k = 0; k <= 5; k++) {
    const val = maxVal - (k / 5) * (maxVal - minVal);
    const span = document.createElement('span');
    span.textContent = val.toFixed(2);
    labelsDiv.appendChild(span);
  }
}

function drawSlopeColorbar(maxSlope) {
  const canvas = document.getElementById('cb-slope');
  const ctx = canvas.getContext('2d');
  const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
  grad.addColorStop(0,    'rgb(180,0,180)');   // very steep (top)
  grad.addColorStop(0.4,  'rgb(220,60,20)');
  grad.addColorStop(0.7,  'rgb(240,200,0)');
  grad.addColorStop(1,    'rgb(20,160,20)');   // flat (bottom)
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  const labelsDiv = document.getElementById('cb-slope-labels');
  labelsDiv.innerHTML = '';
  for (let k = 0; k <= 5; k++) {
    const val = maxSlope * (1 - k / 5);
    const span = document.createElement('span');
    span.textContent = val.toFixed(0) + '°';
    labelsDiv.appendChild(span);
  }
}

// ─── Heatmap overlay ────────────────────────────────────────────────────────
let heatmapMesh = null;

function buildHeatmap(terrainData) {
  if (heatmapMesh) { scene.remove(heatmapMesh); heatmapMesh.geometry.dispose(); heatmapMesh.material.dispose(); }

  const { nx, ny, elevation, x_extent, y_extent } = terrainData;

  const geom = new THREE.PlaneGeometry(
    x_extent[1] - x_extent[0],
    y_extent[1] - y_extent[0],
    nx - 1, ny - 1
  );

  // Match terrain elevation, lifted 3m to avoid z-fighting
  const pos = geom.attributes.position;
  for (let j = 0; j < ny; j++)
    for (let i = 0; i < nx; i++)
      pos.setZ(j * nx + i, elevation[j][i] + 3);
  pos.needsUpdate = true;

  const colors = new Float32Array(pos.count * 3);
  geom.setAttribute('color', new THREE.BufferAttribute(colors, 3));

  const mat = new THREE.MeshBasicMaterial({
    vertexColors: true,
    transparent: true,
    opacity: 0.7,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
    side: THREE.FrontSide,
  });
  window._heatmapMat = mat;

  heatmapMesh = new THREE.Mesh(geom, mat);
  heatmapMesh.position.set(
    (x_extent[0] + x_extent[1]) / 2,
    -(y_extent[0] + y_extent[1]) / 2,
    0
  );
  scene.add(heatmapMesh);
}

// Blackbody colormap: black → dark red → orange → yellow → white
function thermalColor(t) {
  const r = Math.min(1, t * 3);
  const g = Math.min(1, Math.max(0, t * 3 - 1));
  const b = Math.min(1, Math.max(0, t * 3 - 2));
  return [r, g, b];
}

function updateHeatmapColors(scenarioIndex) {
  if (!heatmapMesh || !simData) return;
  const sc = simData.scenarios[scenarioIndex];
  const T = simData.terrain;
  const dT = sc.ground_temp_anomaly;

  let maxDT = 0;
  for (let j = 0; j < T.ny; j++)
    for (let i = 0; i < T.nx; i++)
      if (dT[j][i] > maxDT) maxDT = dT[j][i];

  const arr = heatmapMesh.geometry.attributes.color.array;
  for (let j = 0; j < T.ny; j++) {
    for (let i = 0; i < T.nx; i++) {
      const idx = (j * T.nx + i) * 3;
      const [r, g, b] = thermalColor(dT[j][i] / maxDT);
      arr[idx] = r; arr[idx + 1] = g; arr[idx + 2] = b;
    }
  }
  heatmapMesh.geometry.attributes.color.needsUpdate = true;
  drawThermalColorbar(maxDT);
}

// ─── Sun object ──────────────────────────────────────────────────────────────
let sunSphere = null;
let sunGlow   = null;
let sunLabelDiv = null;
const SUN_R = 7500; // distance from terrain centre to place sun sphere

function sunWorldPos(azDeg, elDeg, terrainCentreZ) {
  const az = azDeg * Math.PI / 180;
  // Cap display elevation so the sun stays visible without looking straight up
  const el = Math.min(elDeg, 50) * Math.PI / 180;
  return new THREE.Vector3(
    SUN_R * Math.sin(az) * Math.cos(el),
   -SUN_R * Math.cos(az) * Math.cos(el),    // -North → Three.js Y
    terrainCentreZ + SUN_R * Math.sin(el)
  );
}

function buildSunObject() {
  // Sphere
  const geo  = new THREE.SphereGeometry(160, 16, 16);
  const mat  = new THREE.MeshBasicMaterial({ color: 0xffee88 });
  sunSphere  = new THREE.Mesh(geo, mat);
  scene.add(sunSphere);

  // Soft glow (larger transparent sphere around it)
  const glowGeo = new THREE.SphereGeometry(320, 16, 16);
  const glowMat = new THREE.MeshBasicMaterial({
    color: 0xffcc44, transparent: true, opacity: 0.18,
    blending: THREE.AdditiveBlending, depthWrite: false,
  });
  sunGlow = new THREE.Mesh(glowGeo, glowMat);
  scene.add(sunGlow);

  // HTML label
  sunLabelDiv = document.createElement('div');
  sunLabelDiv.style.cssText = `
    position: absolute; pointer-events: none;
    background: rgba(10,15,30,0.75); border: 1px solid #ffcc44;
    color: #ffee88; font-size: 11px; font-family: 'Segoe UI', sans-serif;
    padding: 2px 7px; border-radius: 4px; white-space: nowrap;
    transform: translate(-50%, -130%);
  `;
  document.getElementById('canvas-container').appendChild(sunLabelDiv);
}

function updateSunObject(scenarioIndex) {
  if (!simData) return;
  const sc = simData.scenarios[scenarioIndex];
  const cz = (terrainZMin + terrainZMax) / 2;
  const pos = sunWorldPos(sc.sun_azimuth, sc.sun_elevation, cz);

  sunSphere.position.copy(pos);
  sunGlow.position.copy(pos);

  // Update directional light to come from same direction
  sun.position.copy(pos);
  sun.shadow.camera.updateProjectionMatrix();

  // Update label text (position updated each frame in updateSunLabel)
  sunLabelDiv.textContent = `☀ ${sc.name}  el ${sc.sun_elevation}°`;
}

// ─── Albedo overlay ──────────────────────────────────────────────────────────
let albedoMesh = null;

function albedoColor(t) {
  // t in [0,1]: low=blue, mid=green/yellow, high=red
  if (t < 0.5) {
    const s = t * 2;
    return [s * 0.94, 0.31 + s * 0.39, 0.78 - s * 0.47];
  } else {
    const s = (t - 0.5) * 2;
    return [0.94, 0.70 - s * 0.44, 0.31 - s * 0.31];
  }
}

function buildAlbedoOverlay(terrainData) {
  if (albedoMesh) { scene.remove(albedoMesh); albedoMesh.geometry.dispose(); albedoMesh.material.dispose(); }
  if (!terrainData.thermal_factor) return;

  const { nx, ny, elevation, x_extent, y_extent, thermal_factor } = terrainData;
  const geom = new THREE.PlaneGeometry(
    x_extent[1] - x_extent[0], y_extent[1] - y_extent[0], nx - 1, ny - 1
  );
  const pos = geom.attributes.position;
  for (let j = 0; j < ny; j++)
    for (let i = 0; i < nx; i++)
      pos.setZ(j * nx + i, elevation[j][i] + 6);
  pos.needsUpdate = true;

  // Compute range
  let minTF = Infinity, maxTF = -Infinity;
  for (let j = 0; j < ny; j++)
    for (let i = 0; i < nx; i++) {
      const v = thermal_factor[j][i];
      if (v < minTF) minTF = v;
      if (v > maxTF) maxTF = v;
    }

  const colors = new Float32Array(pos.count * 3);
  for (let j = 0; j < ny; j++) {
    for (let i = 0; i < nx; i++) {
      const idx = (j * nx + i) * 3;
      const t = (thermal_factor[j][i] - minTF) / (maxTF - minTF);
      const [r, g, b] = albedoColor(t);
      colors[idx] = r; colors[idx + 1] = g; colors[idx + 2] = b;
    }
  }
  geom.setAttribute('color', new THREE.BufferAttribute(colors, 3));

  const mat = new THREE.MeshBasicMaterial({
    vertexColors: true, transparent: true, opacity: 0,
    blending: THREE.AdditiveBlending, depthWrite: false,
  });
  window._albedoMat = mat;

  albedoMesh = new THREE.Mesh(geom, mat);
  albedoMesh.position.set(
    (x_extent[0] + x_extent[1]) / 2, -(y_extent[0] + y_extent[1]) / 2, 0
  );
  scene.add(albedoMesh);
  drawAlbedoColorbar(minTF, maxTF);
}

// ─── Slope overlay ────────────────────────────────────────────────────────────
let slopeMesh = null;
let slopeMax  = 45;

function slopeColor(t) {
  // t in [0,1]: flat=green, moderate=yellow, steep=red, cliff=purple
  if (t < 0.5) {
    const s = t * 2;
    return [s * 0.86, 0.63 - s * 0.24, 0.08];
  } else {
    const s = (t - 0.5) * 2;
    return [0.86 + s * 0.24, 0.39 - s * 0.39, 0.08 + s * 0.70];
  }
}

function buildSlopeOverlay(terrainData) {
  if (slopeMesh) { scene.remove(slopeMesh); slopeMesh.geometry.dispose(); slopeMesh.material.dispose(); }

  const { nx, ny, elevation, x_extent, y_extent, dx, dy } = terrainData;
  const geom = new THREE.PlaneGeometry(
    x_extent[1] - x_extent[0], y_extent[1] - y_extent[0], nx - 1, ny - 1
  );
  const pos = geom.attributes.position;
  for (let j = 0; j < ny; j++)
    for (let i = 0; i < nx; i++)
      pos.setZ(j * nx + i, elevation[j][i] + 9);
  pos.needsUpdate = true;

  // Compute slope (degrees) via central differences
  const slopeDeg = new Float32Array(ny * nx);
  slopeMax = 0;
  for (let j = 0; j < ny; j++) {
    for (let i = 0; i < nx; i++) {
      const i0 = Math.max(0, i - 1), i1 = Math.min(nx - 1, i + 1);
      const j0 = Math.max(0, j - 1), j1 = Math.min(ny - 1, j + 1);
      const dzdx = (elevation[j][i1] - elevation[j][i0]) / ((i1 - i0) * dx);
      const dzdy = (elevation[j1][i] - elevation[j0][i]) / ((j1 - j0) * dy);
      const s = Math.atan(Math.sqrt(dzdx * dzdx + dzdy * dzdy)) * 180 / Math.PI;
      slopeDeg[j * nx + i] = s;
      if (s > slopeMax) slopeMax = s;
    }
  }

  const colors = new Float32Array(pos.count * 3);
  for (let j = 0; j < ny; j++) {
    for (let i = 0; i < nx; i++) {
      const idx = (j * nx + i) * 3;
      const t = slopeDeg[j * nx + i] / slopeMax;
      const [r, g, b] = slopeColor(t);
      colors[idx] = r; colors[idx + 1] = g; colors[idx + 2] = b;
    }
  }
  geom.setAttribute('color', new THREE.BufferAttribute(colors, 3));

  const mat = new THREE.MeshBasicMaterial({
    vertexColors: true, transparent: true, opacity: 0,
    blending: THREE.AdditiveBlending, depthWrite: false,
  });
  window._slopeMat = mat;

  slopeMesh = new THREE.Mesh(geom, mat);
  slopeMesh.position.set(
    (x_extent[0] + x_extent[1]) / 2, -(y_extent[0] + y_extent[1]) / 2, 0
  );
  scene.add(slopeMesh);
  drawSlopeColorbar(slopeMax);
}

// ─── Neutral shading overlay (Lambert — responds to directional light) ────────
let neutralMesh = null;

function buildNeutralOverlay(terrainData) {
  if (neutralMesh) { scene.remove(neutralMesh); neutralMesh.geometry.dispose(); neutralMesh.material.dispose(); }

  const { nx, ny, elevation, x_extent, y_extent } = terrainData;
  const geom = new THREE.PlaneGeometry(
    x_extent[1] - x_extent[0], y_extent[1] - y_extent[0], nx - 1, ny - 1
  );
  const pos = geom.attributes.position;
  for (let j = 0; j < ny; j++)
    for (let i = 0; i < nx; i++)
      pos.setZ(j * nx + i, elevation[j][i] + 1);
  pos.needsUpdate = true;
  geom.computeVertexNormals();

  // MeshLambertMaterial: lit by the directional sun — slopes facing away go dark
  const mat = new THREE.MeshLambertMaterial({
    color: 0xc8b89a,          // warm limestone/sandstone tone
    transparent: true,
    opacity: 0,
    depthWrite: false,
  });
  window._neutralMat = mat;

  neutralMesh = new THREE.Mesh(geom, mat);
  neutralMesh.receiveShadow = true;
  neutralMesh.position.set(
    (x_extent[0] + x_extent[1]) / 2, -(y_extent[0] + y_extent[1]) / 2, 0
  );
  scene.add(neutralMesh);
}

// ─── Waypoint markers ────────────────────────────────────────────────────────
const MARKER_CONFIG = {
  landing: { color: 0x00ff88, label: '▼ Landing',  poleColor: 0x00cc66 },
  takeoff: { color: 0xff8800, label: '▲ Take-off', poleColor: 0xcc6600 },
};

const markerSprites = [];

function buildMarkers(markersData) {
  // Remove old markers
  markerSprites.forEach(s => scene.remove(s));
  markerSprites.length = 0;

  markersData.forEach(m => {
    const cfg = MARKER_CONFIG[m.type];
    if (!cfg) return;

    const elevation = m.z;

    // Vertical pole
    const poleH = 120;
    const poleGeo = new THREE.CylinderGeometry(4, 4, poleH, 8);
    const poleMat = new THREE.MeshLambertMaterial({ color: cfg.poleColor });
    const pole = new THREE.Mesh(poleGeo, poleMat);
    // CylinderGeometry is Y-up; we rotate so it stands along Z
    pole.rotation.x = Math.PI / 2;
    pole.position.set(m.x, -m.y, elevation + poleH / 2);
    scene.add(pole);
    markerSprites.push(pole);

    // Flag / cone on top
    const coneGeo = new THREE.ConeGeometry(40, 80, 12);
    const coneMat = new THREE.MeshLambertMaterial({ color: cfg.color });
    const cone = new THREE.Mesh(coneGeo, coneMat);
    cone.rotation.x = Math.PI / 2;  // point upward along Z
    cone.position.set(m.x, -m.y, elevation + poleH + 40);
    scene.add(cone);
    markerSprites.push(cone);

    // HTML label overlay (positioned each frame in animate)
    const div = document.createElement('div');
    div.style.cssText = `
      position: absolute; pointer-events: none;
      background: rgba(10,15,30,0.82); border: 1px solid ${cfg.color === 0x00ff88 ? '#00ff88' : '#ff8800'};
      color: ${cfg.color === 0x00ff88 ? '#00ff88' : '#ff8800'};
      font-size: 12px; font-weight: bold; font-family: 'Segoe UI', sans-serif;
      padding: 3px 8px; border-radius: 4px; white-space: nowrap;
      transform: translate(-50%, -100%); margin-top: -8px;
    `;
    div.textContent = `${cfg.label}  ${elevation.toFixed(0)}m`;
    document.getElementById('canvas-container').appendChild(div);

    // Store world position for projection each frame
    cone._labelDiv = div;
    cone._worldPos = new THREE.Vector3(m.x, -m.y, elevation + poleH + 90);
  });
}

function updateMarkerLabels() {
  markerSprites.forEach(obj => {
    if (!obj._labelDiv) return;
    const pos = obj._worldPos.clone().project(camera);
    const x = (pos.x * 0.5 + 0.5) * window.innerWidth;
    const y = (-pos.y * 0.5 + 0.5) * window.innerHeight;
    obj._labelDiv.style.left = x + 'px';
    obj._labelDiv.style.top  = y + 'px';
    // Hide if behind camera
    obj._labelDiv.style.display = pos.z > 1 ? 'none' : 'block';
  });
}


// ─── Init ───────────────────────────────────────────────────────────────────
function init() {
  buildTerrain(simData.terrain);
  applyElevationColors();
  drawElevationColorbar();
  buildHeatmap(simData.terrain);
  updateHeatmapColors(0);
  buildMarkers(simData.markers || []);
  buildAlbedoOverlay(simData.terrain);
  buildSlopeOverlay(simData.terrain);
  buildNeutralOverlay(simData.terrain);
  buildSunObject();
  updateSunObject(0);
  buildPresetButtons();
  // Apply first preset values silently (meshes already built at those opacities)
  if (window._presetsData && window._presetsData.length > 0) {
    for (const [id, val] of Object.entries(window._presetsData[0].sliders)) setSlider(id, val);
  }
  buildScenarioButtons();
  animate();
}

// ─── Presets ──────────────────────────────────────────────────────────────────
function markManual() {
  document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
  const m = document.getElementById('preset-manual');
  if (m) m.classList.add('active');
}

function buildPresetButtons() {
  const presets = window._presetsData || [];
  const container = document.getElementById('preset-buttons');
  container.innerHTML = '';

  presets.forEach((preset, i) => {
    const btn = document.createElement('button');
    btn.className = 'preset-btn' + (i === 0 ? ' active' : '');
    btn.textContent = preset.label;
    btn.title = preset.tip || '';
    btn.onclick = () => {
      document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      for (const [id, val] of Object.entries(preset.sliders)) setSlider(id, val);
    };
    container.appendChild(btn);
  });

  // "Manual" entry — activates automatically when any slider is changed by hand
  const manualBtn = document.createElement('button');
  manualBtn.className = 'preset-btn';
  manualBtn.id = 'preset-manual';
  manualBtn.textContent = 'Manual';
  manualBtn.title = 'Custom slider values';
  manualBtn.onclick = () => {}; // clicking it does nothing; it just shows current state
  container.appendChild(manualBtn);
}

function buildScenarioButtons() {
  const container = document.getElementById('scenario-buttons');
  container.innerHTML = '';
  simData.scenarios.forEach((sc, i) => {
    const btn = document.createElement('button');
    btn.className = 'scenario-btn' + (i === 0 ? ' active' : '');
    btn.textContent = sc.name.replace('_', ' ');
    btn.onclick = () => {
      currentScenario = i;
      container.querySelectorAll('.scenario-btn').forEach((b, j) => {
        b.classList.toggle('active', j === i);
      });
      updateHeatmapColors(i);
      updateSunObject(i);
    };
    container.appendChild(btn);
  });
}

// ─── UI controls ─────────────────────────────────────────────────────────
document.getElementById('terrain-opacity').addEventListener('input', e => {
  const v = parseFloat(e.target.value);
  document.getElementById('terrain-opacity-val').textContent = v.toFixed(2);
  if (window._terrainMat) window._terrainMat.opacity = v;
  document.getElementById('cb-elevation-wrap').style.display = v > 0 ? 'block' : 'none';
});
document.getElementById('heatmap-opacity').addEventListener('input', e => {
  const v = parseFloat(e.target.value);
  document.getElementById('heatmap-opacity-val').textContent = v.toFixed(2);
  if (window._heatmapMat) window._heatmapMat.opacity = v;
  document.getElementById('cb-thermal-wrap').style.display = v > 0 ? 'block' : 'none';
});
document.getElementById('ambient-intensity').addEventListener('input', e => {
  const v = parseFloat(e.target.value);
  document.getElementById('ambient-intensity-val').textContent = v.toFixed(1);
  ambientLight.intensity = v;
});
document.getElementById('sun-intensity').addEventListener('input', e => {
  const v = parseFloat(e.target.value);
  document.getElementById('sun-intensity-val').textContent = v.toFixed(1);
  sun.intensity = v;
});
document.getElementById('albedo-opacity').addEventListener('input', e => {
  const v = parseFloat(e.target.value);
  document.getElementById('albedo-opacity-val').textContent = v.toFixed(2);
  if (window._albedoMat) window._albedoMat.opacity = v;
  document.getElementById('cb-albedo-wrap').style.display = v > 0 ? 'block' : 'none';
});
document.getElementById('slope-opacity').addEventListener('input', e => {
  const v = parseFloat(e.target.value);
  document.getElementById('slope-opacity-val').textContent = v.toFixed(2);
  if (window._slopeMat) window._slopeMat.opacity = v;
  document.getElementById('cb-slope-wrap').style.display = v > 0 ? 'block' : 'none';
});
document.getElementById('neutral-opacity').addEventListener('input', e => {
  const v = parseFloat(e.target.value);
  document.getElementById('neutral-opacity-val').textContent = v.toFixed(2);
  if (window._neutralMat) window._neutralMat.opacity = v;
});

// ─── Slider helpers ───────────────────────────────────────────────────────────
// Flag: true while setSlider is programmatically changing a value,
// so the global 'input' listener doesn't wrongly mark it as Manual.
window._settingPreset = false;

function setSlider(id, val) {
  window._settingPreset = true;
  const el = document.getElementById(id);
  el.value = val;
  el.dispatchEvent(new Event('input'));
  window._settingPreset = false;
}

// Any manual interaction with a slider → switch active preset to "Manual"
document.addEventListener('input', e => {
  if (e.target.type === 'range' && !window._settingPreset) markManual();
}, true /* capture phase — fires before individual listeners */);

// ─── Animate ────────────────────────────────────────────────────────────────
function updateSunLabel() {
  if (!sunSphere || !sunLabelDiv) return;
  const projected = sunSphere.position.clone().project(camera);
  const x = (projected.x * 0.5 + 0.5) * window.innerWidth;
  const y = (-projected.y * 0.5 + 0.5) * window.innerHeight;
  sunLabelDiv.style.left = x + 'px';
  sunLabelDiv.style.top  = y + 'px';
  sunLabelDiv.style.display = projected.z > 1 ? 'none' : 'block';
}

function animate() {
  requestAnimationFrame(animate);
  controls.update();
  updateMarkerLabels();
  updateSunLabel();
  renderer.render(scene, camera);
}

// Resize
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

loadData();
</script>
