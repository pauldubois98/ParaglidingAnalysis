# Cache storage area
# 'keys_zone=my_cache:10m' allocates 10MB for metadata (keys)
# 'max_size=250m' limits the total cached data to 1 Gigabyte
# 'inactive=7d' removes files that haven't been accessed in 7 days
proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=my_cache:10m max_size=250m inactive=7d use_temp_path=off;

server {
    listen 108;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    location = / {
        return 301 /home;
    }

    location / {
        try_files $uri $uri.html $uri/ =404;
    }

    location /proxy {
        set $target_url $arg_url;

        # Security allowlist
        if ($target_url !~* "^https?://(archive-api\.open-meteo\.com|api\.open-meteo\.com|esa-worldcover\.s3\.eu-central-1\.amazonaws\.com)") {
            return 403 "Forbidden: Host not in allowlist";
        }

        # --- Caching Logic ---
        proxy_cache my_cache;
        
        # Cache based on the full URL and Range header (important for GeoTIFFs!)
        proxy_cache_key "$target_url$http_range";
        
        # How long to keep the data
        proxy_cache_valid 200 206 7d; # Cache successful/partial responses for 7 days
        proxy_cache_valid 404 1m;     # Cache "not found" for only 1 minute
        
        # Concurrency control
        proxy_cache_lock on;
        proxy_cache_lock_timeout 5s;

        # Allow the browser to know if it hit the cache (useful for debugging)
        add_header X-Cache-Status $upstream_cache_status;

        # Standard Proxy Settings
        proxy_pass $target_url;
        proxy_set_header Range $http_range;
        proxy_pass_header Content-Range;
        proxy_pass_header Accept-Ranges;
        
        # CORS Headers
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Range, Content-Type' always;

        if ($request_method = 'OPTIONS') { return 204; }
        resolver 8.8.8.8;
    }
}